{% extends "base.html" %}

{% block content %}
<div class="card">
  <h1>Theme settings</h1>
  <p>Choose a global theme for all visitors.</p>

  {% if flash %}
    <p>{{ flash }}</p>
  {% endif %}
  {% if error %}
    <p>{{ error }}</p>
  {% endif %}

  <form method="post" class="form" style="max-width: 360px;">
    <label for="theme">Active theme</label>
    <select id="theme" name="theme" class="input">
      {% for value, label in themes %}
        <option value="{{ value }}" {% if value == current_theme_name %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>

    <button type="submit" class="btn">Save &amp; apply</button>
  </form>
</div>
{% endblock %}
